<script>

const map = L.map('map').setView(
[25.3176,82.9739],
7
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let pickupMarker;
let dropMarker;

let pickupCoords = null;
let dropCoords = null;

let selectingPickup = true;

document.getElementById(
'locationSearch'
).addEventListener(

'keyup',

async function(){

const query = this.value;

if(query.length < 2){

document.getElementById(
'searchResults'
).innerHTML='';

return;

}

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=in&limit=8`

);

const data = await response.json();

let html='';

data.forEach(place=>{

html += `

<div
class="search-item"
onclick="
selectSearchLocation(
${place.lat},
${place.lon},
\`${place.display_name}\`
)
"
>

${place.display_name}

</div>

`;

});

document.getElementById(
'searchResults'
).innerHTML = html;

}

);

function selectSearchLocation(
lat,
lon,
name
){

map.setView(
[lat,lon],
15
);

if(selectingPickup){

pickupCoords = {
lat:parseFloat(lat),
lng:parseFloat(lon)
};

if(pickupMarker){

map.removeLayer(
pickupMarker
);

}

pickupMarker =
L.marker([lat,lon])
.addTo(map)
.bindPopup("Pickup")
.openPopup();

document.getElementById(
'pickup'
).value = name;

selectingPickup = false;

alert(
'Now Select Drop Location'
);

}

else{

dropCoords = {
lat:parseFloat(lat),
lng:parseFloat(lon)
};

if(dropMarker){

map.removeLayer(
dropMarker
);

}

dropMarker =
L.marker([lat,lon])
.addTo(map)
.bindPopup("Drop")
.openPopup();

document.getElementById(
'drop'
).value = name;

selectingPickup = true;

}

document.getElementById(
'searchResults'
).innerHTML='';

document.getElementById(
'locationSearch'
).value='';

}

function calculateFare(){

if(!pickupCoords || !dropCoords){

alert(
'Select Pickup & Drop'
);

return;

}

const rate =
parseInt(
document.getElementById(
'vehicle'
).value
);

const vehicleName =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

const lat1 =
pickupCoords.lat;

const lon1 =
pickupCoords.lng;

const lat2 =
dropCoords.lat;

const lon2 =
dropCoords.lng;

const R = 6371;

const dLat =
(lat2-lat1) *
Math.PI/180;

const dLon =
(lon2-lon1) *
Math.PI/180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

const distance =
(R*c).toFixed(2);

const fare =
Math.round(distance * rate);

document.getElementById(
'result'
).style.display='block';

document.getElementById(
'result'
).innerHTML =

`
🚘 ${vehicleName}

<br><br>

🛣 Distance:
${distance} KM

<br><br>

💰 Total Fare:
₹${fare}
`;

document.getElementById(
'bookingBox'
).style.display='block';

}

function confirmBooking(){

const customerName =
document.getElementById(
'customerName'
).value;

const customerMobile =
document.getElementById(
'customerMobile'
).value;

const vehicleName =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

const result =
document.getElementById(
'result'
).innerText;

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

const message =

`🚖 Gupta Tour Booking

👤 Name: ${customerName}

📞 Mobile: ${customerMobile}

🚘 Vehicle: ${vehicleName}

📍 Pickup:
${pickup}

📍 Drop:
${drop}

${result}`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(message)}`

);

}

</script>
