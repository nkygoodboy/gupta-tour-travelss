
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#005eff,#00bfff);
padding:50px 20px;
color:white;
text-align:center;
}

header h1{
margin:0;
font-size:40px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#005eff;
color:white;
font-size:18px;
font-weight:bold;
}

#map{
height:350px;
margin-top:20px;
border-radius:18px;
}

.result{
margin-top:20px;
background:#eef5ff;
padding:20px;
border-radius:15px;
font-size:20px;
font-weight:bold;
display:none;
}

#booking{
display:none;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Gupta Tour & Travels</h1>

<p>
Cab • SUV • Ertiga • Bus Booking
</p>

</header>

<div class="container">

<div class="card">

<h2>Book Your Ride</h2>

<input
type="text"
id="pickup"
placeholder="Pickup Location">

<input
type="text"
id="drop"
placeholder="Drop Location">

<select id="vehicle">

<option value="18">
Sedan
</option>

<option value="25">
Ertiga
</option>

<option value="30">
SUV
</option>

<option value="50">
Tourist Bus
</option>

</select>

<button onclick="calculateFare()">
Calculate Fare
</button>

<div class="result" id="result"></div>

<div id="booking">

<input
type="text"
id="name"
placeholder="Customer Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<button onclick="bookNow()">
Confirm Booking
</button>

</div>

<div id="map"></div>

</div>

</div>

<a
href="https://wa.me/918840705418"
class="whatsapp">

WhatsApp

</a>

<script>

const map = L.map('map').setView(
[25.3176,82.9739],
8
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let pickupMarker;
let dropMarker;

map.on('click',function(e){

if(!pickupMarker){

pickupMarker =
L.marker(e.latlng)
.addTo(map);

document.getElementById(
'pickup'
).value =
e.latlng.lat.toFixed(5)
+
','+
e.latlng.lng.toFixed(5);

}

else if(!dropMarker){

dropMarker =
L.marker(e.latlng)
.addTo(map);

document.getElementById(
'drop'
).value =
e.latlng.lat.toFixed(5)
+
','+
e.latlng.lng.toFixed(5);

}

});

function calculateFare(){

const pickup =
document.getElementById('pickup').value;

const drop =
document.getElementById('drop').value;

const vehicle =
parseInt(
document.getElementById('vehicle').value
);

if(!pickup || !drop){

alert('Select pickup and drop');

return;

}

const distance =
Math.floor(Math.random()*50)+10;

const fare =
distance * vehicle;

document.getElementById(
'result'
).style.display='block';

document.getElementById(
'result'
).innerHTML =

`
Distance: ${distance} KM
<br><br>
Total Fare: ₹${fare}
`;

document.getElementById(
'booking'
).style.display='block';

}

function bookNow(){

const name =
document.getElementById('name').value;

const mobile =
document.getElementById('mobile').value;

const pickup =
document.getElementById('pickup').value;

const drop =
document.getElementById('drop').value;

const vehicle =
document.getElementById('vehicle')
.options[
document.getElementById('vehicle')
.selectedIndex
].text;

const fare =
document.getElementById('result')
.innerText;

const msg =

`🚖 Gupta Tour Booking

👤 Name: ${name}

📞 Mobile: ${mobile}

📍 Pickup: ${pickup}

📍 Drop: ${drop}

🚘 Vehicle: ${vehicle}

💰 ${fare}`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(msg)}`

);

}

</script>

</body>
</html>
