<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<!-- MAPMYINDIA -->
<script src="https://apis.mappls.com/advancedmaps/api/YOUR_MAPPLS_API_KEY/map_sdk?layer=vector&v=3.0"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#ff7b00,#ff3c00);
padding:70px 20px;
text-align:center;
color:white;
}

header h1{
margin:0;
font-size:42px;
}

header p{
font-size:20px;
margin-top:10px;
}

.booking-box{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,
select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff5e00;
color:white;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

#bookBtn{
display:none;
background:#25D366;
}

#customerBox{
display:none;
}

.result{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.result h2{
margin:0;
font-size:34px;
color:#ff5e00;
}

.result p{
font-size:22px;
}

#map{
width:100%;
height:400px;
border-radius:20px;
margin-top:20px;
}

.contact{
background:#111;
color:white;
text-align:center;
padding:40px 20px;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<h1>
Gupta Tour & Travels
</h1>

<p>
Book Cab Anywhere In India
</p>

</header>

<section class="booking-box">

<h2>
Book Your Ride
</h2>

<select id="vehicle">

<option value="30">
Hatchback ₹30/KM
</option>

<option value="35">
Sedan ₹35/KM
</option>

<option value="40">
Ertiga ₹40/KM
</option>

<option value="45">
SUV ₹45/KM
</option>

<option value="55">
Innova ₹55/KM
</option>

<option value="80">
Tourist Bus ₹80/KM
</option>

</select>

<input
type="text"
id="pickup"
placeholder="Pickup Location"
>

<input
type="text"
id="drop"
placeholder="Drop Location"
>

<button onclick="calculateFare()">
Calculate Fare
</button>

<div id="customerBox">

<input
type="text"
id="customerName"
placeholder="Customer Name"
>

<input
type="tel"
id="customerNumber"
placeholder="Mobile Number"
>

<button id="bookBtn">
Confirm Booking
</button>

</div>

<div id="map"></div>

</section>

<section class="result">

<h2 id="distance">
0 KM
</h2>

<p id="fare">
Fare ₹0
</p>

</section>

<section class="contact">

<h2>
Contact Us
</h2>

<p>
📞 8840705418
</p>

</section>

<script>

let map = new mappls.Map(
'map',
{
center:[28.61,77.23],
zoom:5
}
);

let pickupMarker;
let dropMarker;

async function getCoordinates(place){

const response = await fetch(

`https://atlas.mappls.com/api/places/geocode?address=${encodeURIComponent(place)}&itemCount=1&apiKey=YOUR_MAPPLS_API_KEY`

);

const data = await response.json();

return {

lat:data.copResults.eLoc[0].latitude,

lon:data.copResults.eLoc[0].longitude

};

}

async function calculateFare(){

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

const vehicleRate =
parseInt(
document.getElementById(
'vehicle'
).value
);

const vehicleName =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

if(!pickup || !drop){

alert(
'Enter Pickup & Drop'
);

return;

}

const pickupCoords =
await getCoordinates(pickup);

const dropCoords =
await getCoordinates(drop);

const distance =
getDistanceFromLatLonInKm(

pickupCoords.lat,
pickupCoords.lon,

dropCoords.lat,
dropCoords.lon

);

const fare =
Math.round(distance * vehicleRate);

document.getElementById(
'distance'
).innerHTML =
distance.toFixed(2) + ' KM';

document.getElementById(
'fare'
).innerHTML =
vehicleName + ' Fare ₹' + fare;

document.getElementById(
'customerBox'
).style.display =
'block';

document.getElementById(
'bookBtn'
).style.display =
'block';

document.getElementById(
'bookBtn'
).onclick = function(){

const customerName =
document.getElementById(
'customerName'
).value;

const customerNumber =
document.getElementById(
'customerNumber'
).value;

const message =

`🚖 Gupta Tour & Travels Booking

👤 Name: ${customerName}

📞 Mobile: ${customerNumber}

🚘 Vehicle: ${vehicleName}

📍 Pickup: ${pickup}

📍 Drop: ${drop}

🛣 Distance: ${distance.toFixed(2)} KM

💰 Fare: ₹${fare}

✅ Customer Wants To Confirm Booking`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(message)}`,

'_blank'

);

};

}

function getDistanceFromLatLonInKm(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
deg2rad(lat2-lat1);

const dLon =
deg2rad(lon2-lon1);

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(deg2rad(lat1)) *
Math.cos(deg2rad(lat2)) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =

2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function deg2rad(deg){

return deg * (Math.PI/180);

}

</script>

</body>

</html>
