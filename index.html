<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#005eff,#00bfff);
padding:50px 20px;
text-align:center;
color:white;
}

header h1{
margin:0;
font-size:42px;
}

header p{
font-size:18px;
margin-top:10px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,
select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:17px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#005eff;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0045c7;
}

#map{
height:400px;
margin-top:20px;
border-radius:18px;
}

.result{
margin-top:20px;
padding:20px;
background:#eef5ff;
border-radius:15px;
font-size:20px;
font-weight:bold;
display:none;
color:#005eff;
}

#bookingBox{
display:none;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

#searchResults{
background:white;
border-radius:12px;
margin-top:5px;
max-height:250px;
overflow-y:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.search-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.search-item:hover{
background:#f4f4f4;
}

</style>

</head>

<body>

<header>

<h1>
Gupta Tour & Travels
</h1>

<p>
Cab • SUV • Ertiga • Bus Booking
</p>

</header>

<div class="container">

<div class="card">

<h2>
Book Your Ride
</h2>

<select id="vehicle">

<option value="18">
Sedan
</option>

<option value="25">
Ertiga
</option>

<option value="30">
SUV
</option>

<option value="50">
Tourist Bus
</option>

</select>

<input
type="text"
id="locationSearch"
placeholder="Search Hotel, Airport, Station..."
>

<div id="searchResults"></div>

<input
type="text"
id="pickup"
placeholder="Pickup Location"
readonly
>

<input
type="text"
id="drop"
placeholder="Drop Location"
readonly
>

<button onclick="calculateFare()">

Calculate Fare

</button>

<div class="result" id="result"></div>

<div id="bookingBox">

<input
type="text"
id="customerName"
placeholder="Customer Name"
>

<input
type="tel"
id="customerMobile"
placeholder="Mobile Number"
>

<button onclick="confirmBooking()">

Confirm Booking

</button>

</div>

<div id="map"></div>

</div>

</div>

<a
href="https://wa.me/918840705418"
class="whatsapp">

WhatsApp

</a>

<script>

const map = L.map('map').setView(
[25.3176,82.9739],
7
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let pickupMarker;
let dropMarker;

let pickupCoords = null;
let dropCoords = null;

document.getElementById(
'locationSearch'
).addEventListener(

'keyup',

async function(){

const query = this.value;

if(query.length < 2){

document.getElementById(
'searchResults'
).innerHTML='';

return;

}

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=in&limit=8`

);

const data = await response.json();

let html='';

data.forEach(place=>{

html += `

<div
class="search-item"
onclick="
selectSearchLocation(
${place.lat},
${place.lon},
\`${place.display_name}\`
)
"
>

${place.display_name}

</div>

`;

});

document.getElementById(
'searchResults'
).innerHTML = html;

}

);

function selectSearchLocation(
lat,
lon,
name
){

map.setView(
[lat,lon],
15
);

if(!pickupMarker){

pickupCoords = {
lat:parseFloat(lat),
lng:parseFloat(lon)
};

pickupMarker =
L.marker([lat,lon])
.addTo(map)
.bindPopup("Pickup")
.openPopup();

document.getElementById(
'pickup'
).value = name;

}

else if(!dropMarker){

dropCoords = {
lat:parseFloat(lat),
lng:parseFloat(lon)
};

dropMarker =
L.marker([lat,lon])
.addTo(map)
.bindPopup("Drop")
.openPopup();

document.getElementById(
'drop'
).value = name;

}

document.getElementById(
'searchResults'
).innerHTML='';

document.getElementById(
'locationSearch'
).value='';

}

function calculateFare(){

if(!pickupCoords || !dropCoords){

alert(
'Select Pickup & Drop'
);

return;

}

const rate =
parseInt(
document.getElementById(
'vehicle'
).value
);

const vehicleName =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

const lat1 =
pickupCoords.lat;

const lon1 =
pickupCoords.lng;

const lat2 =
dropCoords.lat;

const lon2 =
dropCoords.lng;

const R = 6371;

const dLat =
(lat2-lat1) *
Math.PI/180;

const dLon =
(lon2-lon1) *
Math.PI/180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

const distance =
(R*c).toFixed(2);

const fare =
Math.round(distance * rate);

document.getElementById(
'result'
).style.display='block';

document.getElementById(
'result'
).innerHTML =

`
🚘 ${vehicleName}

<br><br>

🛣 Distance:
${distance} KM

<br><br>

💰 Total Fare:
₹${fare}
`;

document.getElementById(
'bookingBox'
).style.display='block';

}

function confirmBooking(){

const customerName =
document.getElementById(
'customerName'
).value;

const customerMobile =
document.getElementById(
'customerMobile'
).value;

const vehicleName =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

const result =
document.getElementById(
'result'
).innerText;

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

if(!customerName || !customerMobile){

alert(
'Enter Customer Details'
);

return;

}

const message =

`🚖 Gupta Tour Booking

👤 Name: ${customerName}

📞 Mobile: ${customerMobile}

🚘 Vehicle: ${vehicleName}

📍 Pickup:
${pickup}

📍 Drop:
${drop}

${result}`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(message)}`

);

}

</script>

</body>

</html>
