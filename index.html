

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#ff7b00,#ff3c00);
padding:70px 20px;
text-align:center;
color:white;
}

header h1{
margin:0;
font-size:42px;
}

.booking-box{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,
select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#ff5e00;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

#bookBtn{
display:none;
background:#25D366;
}

#customerBox{
display:none;
}

#map{
height:400px;
margin-top:20px;
border-radius:20px;
}

.result{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.result h2{
color:#ff5e00;
font-size:32px;
margin:0;
}

.search-box{
position:relative;
}

.search-results{
position:absolute;
width:100%;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
max-height:250px;
overflow-y:auto;
z-index:999;
}

.search-item{
padding:12px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.search-item:hover{
background:#f4f4f4;
}

</style>

</head>

<body>

<header>

<h1>
Gupta Tour & Travels
</h1>

<p>
Book Cab Anywhere In India
</p>

</header>

<section class="booking-box">

<select id="vehicle">

<option value="30">
Hatchback ₹30/KM
</option>

<option value="35">
Sedan ₹35/KM
</option>

<option value="40">
Ertiga ₹40/KM
</option>

<option value="45">
SUV ₹45/KM
</option>

<option value="55">
Innova ₹55/KM
</option>

<option value="80">
Tourist Bus ₹80/KM
</option>

</select>

<div class="search-box">

<input
type="text"
id="pickup"
placeholder="Pickup Location"
onkeyup="searchPlace(this.value,'pickupResults','pickup')"
autocomplete="off"
>

<div
id="pickupResults"
class="search-results">
</div>

</div>

<div class="search-box">

<input
type="text"
id="drop"
placeholder="Drop Location"
onkeyup="searchPlace(this.value,'dropResults','drop')"
autocomplete="off"
>

<div
id="dropResults"
class="search-results">
</div>

</div>

<button onclick="calculateFare()">
Calculate Fare
</button>

<div id="customerBox">

<input
type="text"
id="customerName"
placeholder="Customer Name"
>

<input
type="tel"
id="customerNumber"
placeholder="Mobile Number"
>

<button id="bookBtn">
Confirm Booking
</button>

</div>

<div id="map"></div>

</section>

<section class="result">

<h2 id="distance">
0 KM
</h2>

<h2 id="fare">
Fare ₹0
</h2>

</section>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script>

const map = L.map('map').setView(
[22.9734,78.6569],
5
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let pickupCoords;
let dropCoords;

async function searchPlace(
query,
resultBox,
inputId
){

if(query.length < 2){

document.getElementById(
resultBox
).innerHTML='';

return;

}

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=jsonv2&countrycodes=in&limit=8&q=${query}`

);

const data = await response.json();

let html='';

data.forEach(place=>{

html += `

<div
class="search-item"
onclick="
selectPlace(
\`${place.display_name}\`,
${place.lat},
${place.lon},
'${inputId}',
'${resultBox}'
)
"
>

${place.display_name}

</div>

`;

});

document.getElementById(
resultBox
).innerHTML = html;

}

function selectPlace(
name,
lat,
lon,
inputId,
resultBox
){

document.getElementById(
inputId
).value = name;

document.getElementById(
resultBox
).innerHTML='';

if(inputId==='pickup'){

pickupCoords = {
lat:parseFloat(lat),
lon:parseFloat(lon)
};

}else{

dropCoords = {
lat:parseFloat(lat),
lon:parseFloat(lon)
};

}

}

function calculateFare(){

if(!pickupCoords || !dropCoords){

alert(
'Select Pickup & Drop From List'
);

return;

}

const vehicle =
document.getElementById(
'vehicle'
);

const rate =
parseInt(vehicle.value);

const vehicleName =
vehicle.options[
vehicle.selectedIndex
].text;

const distance =
getDistance(

pickupCoords.lat,
pickupCoords.lon,

dropCoords.lat,
dropCoords.lon

);

const fare =
Math.round(distance * rate);

document.getElementById(
'distance'
).innerHTML =
distance.toFixed(2) + ' KM';

document.getElementById(
'fare'
).innerHTML =
vehicleName + '<br>Fare ₹' + fare;

L.marker([
pickupCoords.lat,
pickupCoords.lon
]).addTo(map);

L.marker([
dropCoords.lat,
dropCoords.lon
]).addTo(map);

map.fitBounds([

[
pickupCoords.lat,
pickupCoords.lon
],

[
dropCoords.lat,
dropCoords.lon
]

]);

document.getElementById(
'customerBox'
).style.display='block';

document.getElementById(
'bookBtn'
).style.display='block';

document.getElementById(
'bookBtn'
).onclick=function(){

const customerName =
document.getElementById(
'customerName'
).value;

const customerNumber =
document.getElementById(
'customerNumber'
).value;

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

const message =

`🚖 Gupta Tour & Travels Booking

👤 Name: ${customerName}

📞 Mobile: ${customerNumber}

🚘 Vehicle: ${vehicleName}

📍 Pickup: ${pickup}

📍 Drop: ${drop}

🛣 Distance: ${distance.toFixed(2)} KM

💰 Fare: ₹${fare}`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(message)}`,

'_blank'

);

};

}

function getDistance(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLon =
(lon2-lon1) * Math.PI/180;

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

</script>

</body>
</html>
