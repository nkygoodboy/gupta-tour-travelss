<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<link rel="stylesheet"
href="https://apis.mappls.com/advancedmaps/api/niwgdmbccpgntfpartcsterzyuqwrxtumwqb/map_sdk?layer=vector&v=3.0">

<script src="https://apis.mappls.com/advancedmaps/api/niwgdmbccpgntfpartcsterzyuqwrxtumwqb/map_sdk?layer=vector&v=3.0"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#005eff,#00bfff);
padding:50px 20px;
text-align:center;
color:white;
}

header h1{
margin:0;
font-size:42px;
}

header p{
font-size:18px;
margin-top:10px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-top:20px;
}

input,
select{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:17px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#005eff;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0045c7;
}

#map{
height:350px;
border-radius:18px;
margin-top:20px;
}

.result{
background:#eef5ff;
padding:18px;
border-radius:15px;
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#005eff;
display:none;
}

.book-section{
display:none;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Gupta Tour & Travels</h1>

<p>
Cab | SUV | Ertiga | Bus Booking
</p>

</header>

<div class="container">

<div class="card">

<h2>
Book Your Ride
</h2>

<input
type="text"
id="pickup"
placeholder="Pickup Location">

<input
type="text"
id="drop"
placeholder="Drop Location">

<select id="vehicle">

<option value="18">
Sedan - ₹18/km
</option>

<option value="25">
Ertiga - ₹25/km
</option>

<option value="30">
SUV - ₹30/km
</option>

<option value="50">
Tourist Bus - ₹50/km
</option>

</select>

<button onclick="calculateFare()">

Calculate Fare

</button>

<div class="result" id="result"></div>

<div class="book-section" id="bookSection">

<input
type="text"
id="customerName"
placeholder="Customer Name">

<input
type="tel"
id="customerMobile"
placeholder="Mobile Number">

<button onclick="sendWhatsApp()">

Confirm Booking

</button>

</div>

<div id="map"></div>

</div>

</div>

<a
href="https://wa.me/918840705418"
class="whatsapp">

WhatsApp Us

</a>

<script>

let map;

function initMap(){

map = new mappls.Map(
'map',
{
center:[25.3176,82.9739],
zoom:10
}
);

}

window.onload = initMap;

async function calculateFare(){

const pickup =
document.getElementById('pickup').value;

const drop =
document.getElementById('drop').value;

const rate =
parseInt(
document.getElementById('vehicle').value
);

if(!pickup || !drop){

alert('Enter pickup and drop');

return;

}

const fakeDistance =
Math.floor(
Math.random()*40
)+20;

const totalFare =
fakeDistance * rate;

document.getElementById(
'result'
).style.display='block';

document.getElementById(
'result'
).innerHTML =

`
Distance: ${fakeDistance} KM
<br><br>
Total Fare: ₹${totalFare}
`;

document.getElementById(
'bookSection'
).style.display='block';

}

function sendWhatsApp(){

const name =
document.getElementById(
'customerName'
).value;

const mobile =
document.getElementById(
'customerMobile'
).value;

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

const vehicle =
document.getElementById(
'vehicle'
).options[
document.getElementById(
'vehicle'
).selectedIndex
].text;

const fare =
document.getElementById(
'result'
).innerText;

if(!name || !mobile){

alert('Enter customer details');

return;

}

const message =

`🚖 Gupta Tour Booking

👤 Name: ${name}

📞 Mobile: ${mobile}

📍 Pickup: ${pickup}

📍 Drop: ${drop}

🚘 Vehicle: ${vehicle}

💰 ${fare}
`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(message)}`

);

}

</script>

</body>
</html>
