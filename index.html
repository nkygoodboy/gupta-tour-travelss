<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gupta Tour & Travels</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#ff7b00,#ff3c00);
padding:70px 20px;
text-align:center;
color:white;
}

header h1{
margin:0;
font-size:42px;
}

header p{
font-size:20px;
margin-top:10px;
}

.booking-box{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
background:#ff5e00;
color:white;
font-size:20px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#e65100;
}

#bookBtn{
display:none;
background:#25D366;
}

#customerBox{
display:none;
}

.search-results{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-top:5px;
max-height:250px;
overflow-y:auto;
}

.search-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:15px;
}

.search-item:hover{
background:#f4f4f4;
}

.result{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.result h2{
margin:0;
font-size:34px;
color:#ff5e00;
}

.result p{
font-size:22px;
}

#map{
height:400px;
border-radius:20px;
margin-top:20px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 22px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<header>

<h1>
Gupta Tour & Travels
</h1>

<p>
Book Cab Anywhere In India
</p>

</header>

<section class="booking-box">

<h2>
Book Your Ride
</h2>

<input
type="text"
id="pickup"
placeholder="Enter Pickup Location"
autocomplete="off"
onkeyup="liveSearch(this.value,'pickupResults','pickup')"
>

<div
id="pickupResults"
class="search-results">
</div>

<input
type="text"
id="drop"
placeholder="Enter Drop Location"
autocomplete="off"
onkeyup="liveSearch(this.value,'dropResults','drop')"
>

<div
id="dropResults"
class="search-results">
</div>

<button onclick="calculateFare()">
Calculate Fare
</button>

<div id="customerBox">

<input
type="text"
id="customerName"
placeholder="Enter Your Name"
>

<input
type="tel"
id="customerNumber"
placeholder="Enter Mobile Number"
>

<button id="bookBtn">
Confirm Booking
</button>

</div>

<div id="map"></div>

</section>

<section class="result">

<h2 id="distance">
0 KM
</h2>

<p id="fare">
Fare ₹0
</p>

</section>

<a
href="https://wa.me/918840705418"
class="whatsapp">
WhatsApp
</a>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script>

const RATE_PER_KM = 25;

const map = L.map('map').setView(
[22.9734,78.6569],
5
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

let pickupMarker;
let dropMarker;

async function liveSearch(
query,
resultBox,
inputId
){

if(query.length < 2){

document.getElementById(
resultBox
).innerHTML='';

return;

}

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=json&countrycodes=in&limit=10&q=${query}`

);

const data = await response.json();

let html='';

data.forEach(place=>{

html += `

<div
class="search-item"
onclick="
selectLocation(
\`${place.display_name}\`,
'${inputId}',
'${resultBox}'
)
"
>

${place.display_name}

</div>

`;

});

document.getElementById(
resultBox
).innerHTML = html;

}

function selectLocation(
value,
inputId,
resultBox
){

document.getElementById(
inputId
).value = value;

document.getElementById(
resultBox
).innerHTML='';

}

async function getCoordinates(place){

const response = await fetch(

`https://nominatim.openstreetmap.org/search?format=json&countrycodes=in&q=${place}`

);

const data = await response.json();

return {

lat:parseFloat(data[0].lat),

lon:parseFloat(data[0].lon)

};

}

async function calculateFare(){

const pickup =
document.getElementById(
'pickup'
).value;

const drop =
document.getElementById(
'drop'
).value;

if(!pickup || !drop){

alert(
'Enter Pickup & Drop Location'
);

return;

}

const pickupCoords =
await getCoordinates(pickup);

const dropCoords =
await getCoordinates(drop);

if(pickupMarker){

map.removeLayer(pickupMarker);

}

if(dropMarker){

map.removeLayer(dropMarker);

}

pickupMarker =
L.marker([
pickupCoords.lat,
pickupCoords.lon
]).addTo(map);

dropMarker =
L.marker([
dropCoords.lat,
dropCoords.lon
]).addTo(map);

map.fitBounds([

[pickupCoords.lat,pickupCoords.lon],

[dropCoords.lat,dropCoords.lon]

]);

const distance =
getDistanceFromLatLonInKm(

pickupCoords.lat,

pickupCoords.lon,

dropCoords.lat,

dropCoords.lon

);

const fare =
Math.round(distance * RATE_PER_KM);

document.getElementById(
'distance'
).innerHTML =
distance.toFixed(2) + ' KM';

document.getElementById(
'fare'
).innerHTML =
'Fare ₹' + fare;

document.getElementById(
'customerBox'
).style.display =
'block';

document.getElementById(
'bookBtn'
).style.display =
'block';

document.getElementById(
'bookBtn'
).onclick = function(){

const customerName =
document.getElementById(
'customerName'
).value;

const customerNumber =
document.getElementById(
'customerNumber'
).value;

if(!customerName || !customerNumber){

alert(
'Enter Name & Mobile Number'
);

return;

}

const whatsappMessage =

`🚖 Gupta Tour & Travels Booking

👤 Name: ${customerName}

📞 Mobile: ${customerNumber}

📍 Pickup: ${pickup}

📍 Drop: ${drop}

🛣 Distance: ${distance.toFixed(2)} KM

💰 Fare: ₹${fare}

✅ Customer Wants To Confirm Booking`;

window.open(

`https://wa.me/918840705418?text=${encodeURIComponent(whatsappMessage)}`,

'_blank'

);

};

}

function getDistanceFromLatLonInKm(
lat1,
lon1,
lat2,
lon2
){

const R = 6371;

const dLat =
deg2rad(lat2-lat1);

const dLon =
deg2rad(lon2-lon1);

const a =

Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(deg2rad(lat1)) *
Math.cos(deg2rad(lat2)) *

Math.sin(dLon/2) *
Math.sin(dLon/2);

const c =

2 *
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function deg2rad(deg){

return deg * (Math.PI/180);

}

</script>

</body>

</html>
